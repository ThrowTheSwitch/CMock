---
compiler:
  path: gcc
  options:
    - '-c'
    - '-m64'
    - '-Wall'
    - '-Wunused-parameter'
    - '-Wno-address'
    - '-Wno-invalid-token-paste'
    - '-std=c99'
    - '-pedantic'
  includes:
    prefix: '-I'
  defines:
    prefix: '-D'
    items:
      - CMOCK
      - 'UNITY_SUPPORT_64'
      - 'UNITY_POINTER_WIDTH=64'
  object_files:
    prefix: '-o'
    extension: '.o'

linker:
  path: gcc
  options:
    - -lm
    - '-m64'
  object_files:
    extension: '.o'
  bin_files:
    prefix: '-o'
    extension: '.exe'

unsupported:
  - out_of_memory
  - callingconv
